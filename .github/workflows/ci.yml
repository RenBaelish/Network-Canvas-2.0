name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24.x'
        cache: 'npm'
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        
    - name: Install dependencies
      run: npm install
      
    - name: Run Type Check
      run: npm run check
      
    - name: Build Project
      run: npm run build
